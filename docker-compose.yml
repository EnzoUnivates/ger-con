version: '3.8'

services:
  # --- AMBIENTE DE HOMOLOGAÇÃO ---
  homologacao:
    build: .
    container_name: finance-homologacao
    restart: always
    ports:
      - "3001:3000" # Acessível na porta 3001 da sua VM
    environment:
      - NODE_ENV=development
    volumes:
      # Cria uma pasta persistente para o banco de homologação na VM
      - ./data/homologacao:/app/prisma

  # --- AMBIENTE DE PRODUÇÃO ---
  producao:
    build: .
    container_name: finance-producao
    restart: always
    ports:
      - "3000:3000" # Acessível na porta 3000 da sua VM
    environment:
      - NODE_ENV=production
    volumes:
      # Cria uma pasta persistente para o banco de produção na VM
      - ./data/producao:/app/prisma